<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Poppins;background:#f8fafc;color:#1e293b}
    header{position:sticky;top:0;padding:14px;text-align:center;background:#fff;font-weight:600;color:#ff7a18}
    .container{padding:12px 14px 80px;max-width:900px;margin:auto}

    .card{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
    .recipe h3{margin:0;color:#ff7a18}

    input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ddd}

    #search{margin-bottom:10px}

    .fab{position:fixed;bottom:16px;right:16px;width:60px;height:60px;border-radius:50%;background:#ff7a18;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}

    .menu{position:fixed;bottom:90px;right:16px;background:white;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.15);display:none}
    .menu div{padding:12px 16px;cursor:pointer}
    .menu div:hover{background:#f1f5f9}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:flex-end}
    .sheet{background:white;width:100%;padding:16px;border-radius:16px 16px 0 0}

    iframe{width:100%;height:200px;border-radius:10px;margin-top:8px}

    .delete-box{margin-top:8px}
  </style>
</head>
<body>

<header>🍲 Recipe Vault</header>

<div class="container">
  <input id="search" placeholder="🔍 Search recipes" oninput="displayRecipes()">
  <div id="recipes"></div>
</div>

<div class="fab" onclick="toggleMenu()">＋</div>

<div class="menu" id="menu">
  <div onclick="openModal()">➕ Add Recipe</div>
  <div onclick="toggleDeleteMode()">🗑️ Delete Mode</div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3>Add Recipe</h3>
    <input id="title" placeholder="Title">
    <textarea id="ingredients" placeholder="Ingredients"></textarea>
    <textarea id="steps" placeholder="Steps"></textarea>
    <input id="video" placeholder="YouTube link">
    <button onclick="addRecipe()">Save</button>
  </div>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem('recipes')) || [];

// ensure each recipe has unique id
recipes = recipes.map(r => ({...r, id: r.id || Date.now() + Math.random()}));

let deleteMode = false;
let selected = new Set();

function save(){localStorage.setItem('recipes',JSON.stringify(recipes));}

function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display = m.style.display==='block'?'none':'block';
}

function openModal(){
  document.getElementById('modal').style.display='flex';
  toggleMenu();
}

function addRecipe(){
  const t=title.value.trim(),i=ingredients.value.trim(),s=steps.value.trim(),v=video.value.trim();
  if(!t||!i||!s) return;

  recipes.unshift({title:t,ingredients:i,steps:s,video:v,id:Date.now()+Math.random()});
  save();
  displayRecipes();

  title.value=ingredients.value=steps.value=video.value='';
  document.getElementById('modal').style.display='none';
}

function toggleDeleteMode(){
  deleteMode=!deleteMode;
  selected.clear();
  displayRecipes();
  toggleMenu();
}

function embed(url){
  if(!url) return '';
  let id='';
  if(url.includes('watch?v=')) id=url.split('watch?v=')[1];
  else if(url.includes('youtu.be/')) id=url.split('youtu.be/')[1];
  if(id.includes('&')) id=id.split('&')[0];
  return id?`https://www.youtube.com/embed/${id}`:'';
}

function toggleSelect(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
}

function deleteSelected(){
  if(selected.size===0) return;
  if(confirm('Delete selected recipes?')){
    recipes = recipes.filter(r => !selected.has(r.id));
    save();
    selected.clear();
    deleteMode=false;
    displayRecipes();
  }
}

function displayRecipes(){
  const q=document.getElementById('search').value.toLowerCase();
  const el=document.getElementById('recipes');
  el.innerHTML='';

  recipes
    .filter(r=>r.title.toLowerCase().includes(q))
    .forEach((r)=>{
      const v=embed(r.video);
      el.innerHTML+=`
        <div class="card recipe">
          <h3>${r.title}</h3>
          <p><b>Ingredients</b><br>${r.ingredients.replace(/\n/g,'<br>')}</p>
          <p><b>Steps</b><br>${r.steps.replace(/\n/g,'<br>')}</p>
          ${v?`<iframe src="${v}" allowfullscreen></iframe>`:''}
          ${deleteMode?`<div class="delete-box"><input type="checkbox" onclick="toggleSelect(${r.id})"> Select</div>`:''}
        </div>`;
    });

  if(deleteMode){
    el.innerHTML += `<button onclick="deleteSelected()" style="width:100%;padding:12px;background:#ef4444;color:white;border:none;border-radius:12px">Delete Selected</button>`;
  }
}

displayRecipes();
</script>

</body>
</html>
