<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recipe Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:linear-gradient(135deg,#fff1eb,#e0f7fa,#e8f5e9);--accent:#ff6b6b;--accent2:#4facfe}
body{margin:0;font-family:Poppins;background:var(--bg);color:#1e293b}
header{padding:16px;text-align:center;font-weight:600;color:white;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:0 0 20px 20px}
.tabs{display:flex;gap:10px;padding:10px}
.tab{flex:1;padding:10px;border-radius:20px;background:white;text-align:center;cursor:pointer}
.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:white}
.container{padding:12px 14px 80px;max-width:900px;margin:auto}
.card{background:white;border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 6px 20px rgba(0,0,0,.08);cursor:pointer}
.details{display:none;margin-top:10px}
.meal{background:white;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
.meal h3{margin:0 0 6px;color:var(--accent)}
input,textarea{width:100%;padding:12px;margin:6px 0;border-radius:14px;border:1px solid #ddd}
.fab{position:fixed;bottom:16px;right:16px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:28px;display:flex;align-items:center;justify-content:center}
.menu{position:fixed;bottom:90px;right:16px;background:white;border-radius:16px;display:none}
.menu div{padding:12px 16px;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:flex-end}
.sheet{background:white;width:100%;padding:16px;border-radius:20px 20px 0 0}
iframe{width:100%;height:200px;border-radius:14px;margin-top:8px}
</style>
</head>
<body>

<header>THE SINGHAL DIET</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('recipes',event)">Recipes</div>
  <div class="tab" onclick="switchTab('diet',event)">Today’s Diet</div>
</div>

<div id="recipesTab" class="container">
  <input id="search" placeholder="🔍 Search" oninput="displayRecipes()">
  <div id="recipes"></div>
</div>

<div id="dietTab" class="container" style="display:none">
  <div id="dietContent"></div>
</div>

<div class="fab" onclick="toggleMenu()">＋</div>

<div class="menu" id="menu">
  <div onclick="openModal()">➕ Add</div>
  <div onclick="toggleEditMode()">✏️ Edit</div>
  <div onclick="toggleDeleteMode()">🗑️ Delete</div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <h3>Add / Edit Recipe</h3>
    <input id="title" placeholder="Title">
    <textarea id="ingredients" placeholder="Ingredients"></textarea>
    <textarea id="steps" placeholder="Steps"></textarea>
    <input id="video" placeholder="YouTube link">
    <button onclick="saveRecipe()">Save</button>
  </div>
</div>

<script>
// ===== DAILY DIET LOGIC =====
const dietPlans = {
  0:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'1 stuffed roti with 1 small bowl curd(low fat)',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'greek yogurt one cup with chopped fruits and nuts',m5:'1 cup tea / coffee with handful of roasted makhana',m6:'Cheat Meal/ one medium bowl red sauce pasta',m7:'Green tea with 4 almonds + 2 cashews'},
  1:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'1 Katori vegetable poha with 1 glass milk / 1 glass buttermilk',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'Salad + Moong dal Khichdi+ 1 small bowl curd',m5:'1 cup tea / coffee with handful of roasted makhana',m6:'Vegetable Soup + Moong Dal Chilla',m7:'Green tea with 4 almonds + 2 cashews'},
  2:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'2 Ragi Idli with sauteed veggies with 1 glass milk / 1 glass buttermilk',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'Salad + 1 chapatti with choice of veggies and one katori Dal',m5:'1 cup tea / coffee Handful of roasted chana',m6:'Vegetable Soup + Sauteed veggies + Paneer',m7:'Green tea with 4 almonds + 2 cashews'},
  3:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'1 katori vegetable Upma with 1 glass milk / 1 glass buttermilk',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'salad + 1 katori chana/rajma curry + 1 katori rice',m5:'1 cup tea / coffee 1 masala dal papad',m6:'Salad + 1 stuffed roti with chutney',m7:'Green tea with 4 almonds + 2 cashews'},
  4:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'1 vegetable cheese Sandwich with 1 glass milk / 1 glass Buttermilk',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'salad + 1 whole wheat Paneer wrap with lots of veggies and vinegar based dressing',m5:'1cup tea / coffee 1 cup popcorn ( without butter )',m6:'Moong Dal Chilla + Veggies',m7:'Green tea with 4 almonds + 2 cashews'},
  5:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'paneer bhurji and 1 toast',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'salad + Rajma chawal or Chana chawal',m5:'1 cup tea / coffee mango salsa dip 1-2 tbsp with 1 masala khakara',m6:'Home made chilly Paneer',m7:'Green tea with 4 almonds + 2 cashews'},
  6:{m1:'lukewarm water with 4 soaked almonds + 1 soaked walnut',m2:'1 whole wheat pancake(no sugar) or masala oats with veggies',m3:'One fruit with 1 glass coconut water or with 1 glass lemon chia water.',m4:'1 bowl of watermelon and sprouts salad',m5:'1 cup tea / coffee with murmura chaat',m6:'salad + Besan or Moong dal cheela + chutney',m7:'Green tea with 4 almonds + 2 cashews'}
};

function loadDiet(){
  const day = new Date().getDay();
  const diet = dietPlans[day];

  const el = document.getElementById('dietContent');
  el.innerHTML = `
    <div class="meal"><h3>🌅 Early Morning(7-7:30 a.m.)</h3><p>${diet.m1}</p></div>
    <div class="meal"><h3>🍳 Breakfast(8:30-9:30 a.m.)</h3><p>${diet.m2}</p></div>
    <div class="meal"><h3>🍎 Mid-Morning(11-11:30 a.m.)</h3><p>${diet.m3}</p></div>
    <div class="meal"><h3>🥗 Lunch(1-2 p.m.)</h3><p>${diet.m4}</p></div>
    <div class="meal"><h3>☕ Evening Snack(4:30-5:30 p.m.)</h3><p>${diet.m5}</p></div>
    <div class="meal"><h3>🌙 Dinner(7:30-8:30 p.m.)</h3><p>${diet.m6}</p></div>
    <div class="meal"><h3>🥛 Post Dinner(9:30-10 p.m.)</h3><p>${diet.m7}</p></div>
  `;;
}

// ===== RECIPES LOGIC =====
let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
recipes = recipes.map(r => ({...r, id: r.id || Date.now()+Math.random()}));

let editMode=false, deleteMode=false, editingId=null, selected=new Set();

function switchTab(tab,e){
  document.getElementById('recipesTab').style.display = tab==='recipes'?'block':'none';
  document.getElementById('dietTab').style.display = tab==='diet'?'block':'none';

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');

  if(tab==='diet') loadDiet();
}

function save(){localStorage.setItem('recipes',JSON.stringify(recipes));}
function toggleMenu(){const m=document.getElementById('menu');m.style.display=m.style.display==='block'?'none':'block'}
function openModal(){document.getElementById('modal').style.display='flex';toggleMenu()}
function closeModal(){document.getElementById('modal').style.display='none'}

function toggleEditMode(){editMode=!editMode;deleteMode=false;displayRecipes();toggleMenu()}
function toggleDeleteMode(){deleteMode=!deleteMode;editMode=false;selected.clear();displayRecipes();toggleMenu()}

function saveRecipe(){
  const t=title.value.trim(),i=ingredients.value.trim(),s=steps.value.trim(),v=video.value.trim();
  if(!t||!i||!s)return alert('Fill all fields');

  if(editingId){recipes=recipes.map(r=>r.id===editingId?{...r,title:t,ingredients:i,steps:s,video:v}:r);editingId=null}
  else{recipes.unshift({title:t,ingredients:i,steps:s,video:v,id:Date.now()+Math.random()})}

  save();displayRecipes();title.value=ingredients.value=steps.value=video.value='';closeModal()
}

function toggleDetails(id){
  const el=document.getElementById('details-'+id);
  el.style.display=el.style.display==='block'?'none':'block';
}

function editRecipe(id){
  const r=recipes.find(x=>x.id===id);
  title.value=r.title;ingredients.value=r.ingredients;steps.value=r.steps;video.value=r.video;
  editingId=id;openModal();
}

function toggleSelect(id){selected.has(id)?selected.delete(id):selected.add(id)}
function deleteSelected(){if(confirm('Delete?')){recipes=recipes.filter(r=>!selected.has(r.id));save();selected.clear();deleteMode=false;displayRecipes()}}

function displayRecipes(){
  const q=search.value.toLowerCase();
  const el=document.getElementById('recipes');el.innerHTML='';

  recipes.filter(r=>r.title.toLowerCase().includes(q)).forEach(r=>{
    const v=r.video?`<iframe src="https://www.youtube.com/embed/${r.video.split('v=')[1]||r.video.split('/').pop()}"></iframe>`:'';

    let click='';
    if(editMode)click=`editRecipe(${r.id})`;
    else if(!deleteMode)click=`toggleDetails(${r.id})`;

    el.innerHTML+=`
    <div class="card" onclick="${click}">
      <div>${r.title}</div>
      <div class="details" id="details-${r.id}">
        <p>${r.ingredients.replace(/\n/g,'<br>')}</p>
        <p>${r.steps.replace(/\n/g,'<br>')}</p>
        ${v}
      </div>
      ${deleteMode?`<input type="checkbox" onclick="event.stopPropagation();toggleSelect(${r.id})">`:''}
    </div>`;
  });

  if(deleteMode){el.innerHTML+=`<button onclick="deleteSelected()" style="width:100%;padding:12px;background:red;color:white;border:none;border-radius:14px">Delete Selected</button>`}
}

displayRecipes();
</script>

</body>
</html>
