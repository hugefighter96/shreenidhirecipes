<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:linear-gradient(135deg,#fff7ed,#ecfeff);--accent:#ff7a18;--accent2:#32d2aa}
    body{margin:0;font-family:Poppins;background:var(--bg)}
    header{padding:14px;text-align:center;font-weight:600;color:var(--accent)}
    .container{padding:12px 14px 80px;max-width:900px;margin:auto}

    .card{background:white;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 6px 15px rgba(0,0,0,.08);cursor:pointer}
    .details{display:none;margin-top:10px}

    input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ddd}

    .fab{position:fixed;bottom:16px;right:16px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:28px;display:flex;align-items:center;justify-content:center}

    .menu{position:fixed;bottom:90px;right:16px;background:white;border-radius:12px;display:none}
    .menu div{padding:12px 16px;cursor:pointer}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:flex-end}
    .sheet{background:white;width:100%;padding:16px;border-radius:16px 16px 0 0}

    iframe{width:100%;height:200px;border-radius:10px;margin-top:8px}
  </style>
</head>
<body>

<header>🍲 Recipe Vault</header>

<div class="container">
  <input id="search" placeholder="🔍 Search" oninput="displayRecipes()">
  <div id="recipes"></div>
</div>

<div class="fab" onclick="toggleMenu()">＋</div>

<div class="menu" id="menu">
  <div onclick="openModal()">➕ Add</div>
  <div onclick="toggleEditMode()">✏️ Edit Mode</div>
  <div onclick="toggleDeleteMode()">🗑️ Delete Mode</div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <h3>Add / Edit Recipe</h3>
    <input id="title" placeholder="Title">
    <textarea id="ingredients" placeholder="Ingredients"></textarea>
    <textarea id="steps" placeholder="Steps"></textarea>
    <input id="video" placeholder="YouTube link">
    <button onclick="saveRecipe()">Save</button>
  </div>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
recipes = recipes.map(r => ({...r, id: r.id || Date.now()+Math.random()}));

let editMode=false;
let deleteMode=false;
let editingId=null;
let selected=new Set();

function save(){localStorage.setItem('recipes',JSON.stringify(recipes));}

function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display = m.style.display==='block'?'none':'block';
}

function openModal(){
  document.getElementById('modal').style.display='flex';
  toggleMenu();
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function toggleEditMode(){
  editMode=!editMode;
  deleteMode=false;
  toggleMenu();
}

function toggleDeleteMode(){
  deleteMode=!deleteMode;
  editMode=false;
  selected.clear();
  displayRecipes();
  toggleMenu();
}

function saveRecipe(){
  const t=document.getElementById('title').value.trim();
  const i=document.getElementById('ingredients').value.trim();
  const s=document.getElementById('steps').value.trim();
  const v=document.getElementById('video').value.trim();

  if(!t || !i || !s){
    alert('Please fill all required fields');
    return;
  }

  if(editingId){
    recipes = recipes.map(r => r.id===editingId ? {...r,title:t,ingredients:i,steps:s,video:v} : r);
    editingId = null;
  } else {
    recipes.unshift({title:t,ingredients:i,steps:s,video:v,id:Date.now()+Math.random()});
  }

  save();
  displayRecipes();

  document.getElementById('title').value='';
  document.getElementById('ingredients').value='';
  document.getElementById('steps').value='';
  document.getElementById('video').value='';

  closeModal();
}

function toggleDetails(id){
  const el=document.getElementById('details-'+id);
  el.style.display = el.style.display==='block'?'none':'block';
}

function editRecipe(id){
  const r=recipes.find(x=>x.id===id);
  if(!r) return;

  document.getElementById('title').value=r.title;
  document.getElementById('ingredients').value=r.ingredients;
  document.getElementById('steps').value=r.steps;
  document.getElementById('video').value=r.video;

  editingId=id;
  openModal();
}

function toggleSelect(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
}

function deleteSelected(){
  if(selected.size===0) return;
  if(confirm('Delete selected?')){
    recipes=recipes.filter(r=>!selected.has(r.id));
    save();
    selected.clear();
    deleteMode=false;
    displayRecipes();
  }
}

function displayRecipes(){
  const q=document.getElementById('search').value.toLowerCase();
  const el=document.getElementById('recipes');
  el.innerHTML='';

  recipes.filter(r=>r.title.toLowerCase().includes(q)).forEach(r=>{
    const v = r.video?`<iframe src="https://www.youtube.com/embed/${r.video.split('v=')[1]||r.video.split('/').pop()}" allowfullscreen></iframe>`:'';

    let clickAction = '';
    if(editMode) clickAction = `editRecipe(${r.id})`;
    else if(!deleteMode) clickAction = `toggleDetails(${r.id})`;

    el.innerHTML+=`
      <div class="card" onclick="${clickAction}">
        <div>${r.title}</div>
        <div class="details" id="details-${r.id}">
          <p>${r.ingredients.replace(/\n/g,'<br>')}</p>
          <p>${r.steps.replace(/\n/g,'<br>')}</p>
          ${v}
        </div>
        ${deleteMode?`<input type="checkbox" onclick="event.stopPropagation();toggleSelect(${r.id})">`:''}
      </div>`;
  });

  if(deleteMode){
    el.innerHTML+=`<button onclick="deleteSelected()" style="width:100%;padding:12px;background:red;color:white;border:none;border-radius:12px">Delete Selected</button>`;
  }
}

displayRecipes();
</script>

</body>
</html>
